services:
  qsl_rs:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/query-store-links/qsl_rs:latest
    ports:
      - "8080:8080"
    environment:
      HOST: "0.0.0.0"
      PORT: "8080"
      ALLOWED_ORIGINS: "https://*.krnl64.win"
      # Uncomment for local development (allows localhost origins):
      # DEV: "true"
      LOG_LEVEL: "info"
    restart: unless-stopped
